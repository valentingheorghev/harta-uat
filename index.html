<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Hartă România</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }

    .leaflet-container {
      background: #ffffff !important;
    }

    /* Container aplicație */
    #apysis-map-wrapper {
      position: relative;
      width: 100%;
      height: 100vh;
      display: block;
      line-height: 0;
    }

    #apysis-map {
      width: 100%;
      height: 100%;
    }

    /* ===== Tooltip județe ===== */
    .leaflet-tooltip.label-judet {
      background: none;
      border: none;
      box-shadow: none;
      color: #000;
      font-size: 13px;
      font-weight: 700;
      pointer-events: none;
      white-space: nowrap;
      text-align: center;
      text-shadow:
        1px 1px 2px rgba(255,255,255,0.8),
       -1px -1px 2px rgba(255,255,255,0.8);
    }

    /* ===== Label UAT ===== */
    .uat-label-wrap.leaflet-div-icon {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    .label-uat {
      position: absolute;
      transform: translate(-50%, -50%);
      color: #1a1a1a;
      font-size: 10px;
      font-weight: 500;
      font-family: Arial, sans-serif;
      pointer-events: none;
      white-space: nowrap;
      text-align: center;
      line-height: 1.3;
      text-shadow:
        1px 1px 2px rgba(255,255,255,0.95),
       -1px -1px 2px rgba(255,255,255,0.95),
        1px -1px 2px rgba(255,255,255,0.95),
       -1px 1px 2px rgba(255,255,255,0.95);
    }

    .label-uat.label-hover {
      font-size: 13px;
      font-weight: 700;
      color: #000;
    }

    .labels-hidden .label-uat {
      display: none;
    }

/* ===== Buton Back ===== */
#backBtn {
  position: absolute;
  top: 60px;
  left: 10px;
  z-index: 1000;
  padding: 6px 14px;
  background: white;
  border: 1px solid #999;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  display: none;
}

/* ===== Buton Reset View ===== */
#resetViewBtn {
  position: absolute;
  top: 100px;
  left: 10px;
  z-index: 1000;
  padding: 6px 14px;
  background: white;
  border: 1px solid #999;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
}

/* Hover */
#backBtn:hover,
#resetViewBtn:hover {
  background: #f0f0f0;
}

    /* ===== Legendă ===== */
    .info.legend {
      background: white;
      padding: 10px;
      font-size: 12px;
      line-height: 18px;
      border-radius: 4px;
      box-shadow: 0 0 8px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

  <div id="apysis-map-wrapper">
    <div id="apysis-map"></div>

    <button id="backBtn">&#8592; Înapoi la județe</button>
    <button id="resetViewBtn">Reset hartă</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>

</body>
</html>
