<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hartă România</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .leaflet-container {
      background: #ffffff !important;
    }

    /* Container aplicație */
    #apysis-map-wrapper {
      position: relative;
      width: 100%;
      max-width: 100%;
      height: 600px;
      display: block;
      line-height: 0;
      overflow: hidden;
    }

    #apysis-map {
      width: 100%;
      height: 100%;
    }

    /* ===== Tooltip județe ===== */
    .leaflet-tooltip.label-judet {
      background: none;
      border: none;
      box-shadow: none;
      color: #000;
      font-size: 13px;
      font-weight: 700;
      pointer-events: none;
      white-space: nowrap;
      text-align: center;
      text-shadow:
    0 0 4px #fff,
    0 0 4px #fff,
    0 0 4px #fff,
    1px 1px 0 #fff,
   -1px -1px 0 #fff,
    1px -1px 0 #fff,
   -1px  1px 0 #fff,
    2px 2px 4px rgba(255,255,255,0.9),
   -2px -2px 4px rgba(255,255,255,0.9);
    }

    /* ===== Label UAT ===== */
    .uat-label-wrap.leaflet-div-icon {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    .label-uat {
      position: absolute;
      transform: translate(-50%, -50%);
      color: #1a1a1a;
      font-size: 10px;
      font-weight: 500;
      font-family: Arial, sans-serif;
      pointer-events: none;
      white-space: nowrap;
      text-align: center;
      line-height: 1.3;
      text-shadow:
        1px 1px 2px rgba(255,255,255,0.95),
       -1px -1px 2px rgba(255,255,255,0.95),
        1px -1px 2px rgba(255,255,255,0.95),
       -1px 1px 2px rgba(255,255,255,0.95);
    }

    .label-uat.label-hover {
      font-size: 13px;
      font-weight: 700;
      color: #000;
    }

    .labels-hidden .label-uat {
      display: none;
    }

    /* ===== Container butoane stânga ===== */
    #map-controls {
      position: absolute;
      top: 80px;
      left: 10px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #backBtn,
    #resetViewBtn {
      padding: 0;
      background: none;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      font-size: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      overflow: hidden;
      min-width: 150px;
      text-align: left;
    }

    #backBtn {
      display: none;
    }

    #backBtn:hover .btn-body,
    #resetViewBtn:hover .btn-body {
      background: #f4f8fd;
    }

    /* ===== Legendă — stilizată inline în app.js ===== */

    /* ===== Layer Control stilizat ===== */
    .leaflet-control-layers {
      border: none !important;
      border-radius: 8px !important;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18) !important;
      font-family: Arial, sans-serif;
      font-size: 12px;
      min-width: 160px;
    }

    .leaflet-control-layers-expanded {
      padding: 0 !important;
      overflow: hidden;
    }

    .leaflet-control-layers-expanded::before {
      content: "Straturi hartă";
      display: block;
      background: #193662;
      color: white;
      font-weight: 700;
      font-size: 12px;
      padding: 8px 12px;
      letter-spacing: 0.4px;
    }

    .leaflet-control-layers-list {
      padding: 8px 12px 10px 12px !important;
    }

    .leaflet-control-layers-separator {
      margin: 6px 0 !important;
      border-top: 1px solid #e0e0e0 !important;
    }

    .leaflet-control-layers label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      cursor: pointer;
      color: #333;
    }

    .leaflet-control-layers label:hover {
      color: #2c6fad;
    }

    .leaflet-control-layers input[type="radio"],
    .leaflet-control-layers input[type="checkbox"] {
      margin: 0;
      accent-color: #2c6fad;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <div id="apysis-map-wrapper">
    <div id="apysis-map" data-base-root="/search/gis/"></div>

    <div id="map-controls">
      <button id="backBtn">
        <div style="background:#193662;color:white;font-weight:700;font-size:12px;padding:8px 12px;letter-spacing:0.4px;">Navigare</div>
        <div class="btn-body" style="padding:8px 12px;background:white;color:#333;font-size:12px;transition:background 0.15s;">&#8592; Înapoi la județe</div>
      </button>
      <button id="resetViewBtn">
        <div style="background:#193662;color:white;font-weight:700;font-size:12px;padding:8px 12px;letter-spacing:0.4px;">Vizualizare</div>
        <div class="btn-body" style="padding:8px 12px;background:white;color:#333;font-size:12px;transition:background 0.15s;">&#8635; Reset hartă</div>
        <div style="padding:6px 12px 10px 12px;background:white;border-top:1px solid #e0e0e0;">
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#333;cursor:pointer;font-family:Arial,sans-serif;font-weight:normal;">
            <input type="checkbox" id="toggle-transparent" style="margin:0;accent-color:#2c6fad;cursor:pointer;">
            Poligoane transparente
          </label>
        </div>
      </button>
    </div>

  </div><!-- închide apysis-map-wrapper -->

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>

</body>

</html>
