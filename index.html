<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Hartă România</title>

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
   /* HARTA */
#map {
  height: 100vh;
}

/* LABEL SIMPLU */
.label-judet,
.label-uat {
  color: #000;
  background: none !important;
  border: none !important;
  box-shadow: none !important;
  white-space: nowrap;
  pointer-events: none;
  text-align: center;
}

/* JUDEȚ */
.label-judet {
  font-size: 11px;
  font-weight: 600;
}

/* UAT */
.label-uat {
  font-size: 9px;
}

    /* BUTON INAPOI */
    #backBtn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      padding: 6px 12px;
      background: white;
      border: 1px solid #ccc;
      cursor: pointer;
      display: none;
      font-family: Arial, sans-serif;
    }

    #backBtn:hover {
      background: #f2f2f2;
    }

/* LABEL JUDEȚ – SIMPLU, NEGRU */
.leaflet-tooltip.label-judet {
  background: none;
  border: none;
  box-shadow: none;
  color: #000;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  pointer-events: none;
  white-space: nowrap;
}

/* LABEL UAT – SIMPLU, NEGRU */
.leaflet-tooltip.label-uat {
  background: none;
  border: none;
  box-shadow: none;
  color: #000;
  font-size: 11px;
  font-weight: 400;
  pointer-events: none;
  white-space: nowrap;
}
  </style>
</head>

<body>

  <div id="map"></div>
  <button id="backBtn">Înapoi la județe</button>

  <script src="app.js"></script>
</body>
</html>
